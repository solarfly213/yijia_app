name: yijia_app
description: 老年人认知训练与回忆疗法应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  image_picker: ^1.0.4
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

